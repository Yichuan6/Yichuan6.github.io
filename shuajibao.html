<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>刷机包专区</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#e5e7eb;
    padding:16px;
    font-family:system-ui, sans-serif;
}
.back-btn{
    display:block;
    margin-bottom:15px;
    padding:10px;
    background:#2563eb;
    color:#fff;
    text-align:center;
    border-radius:10px;
    text-decoration:none;
}
.wrap-card{
    background:#fff;
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
}
.card-title{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}
.logo-wrap{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;
    margin:15px 0;
}
.brand-logo{
    width:32px;
    height:32px;
    border-radius:8px;
    border:2px solid #d1d5db;
    overflow:hidden;
}
.brand-logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.line{
    width:100%;
    height:1px;
    background:#d1d5db;
    margin:10px 0 20px;
}
.brand-btns{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:20px;
}
.brand-btn{
    padding:14px;
    border-radius:12px;
    border:2px solid #d1d5db;
    background:#fff;
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    cursor:pointer;
}
.brand-btn.active{
    background:#2563eb;
    color:#fff;
    border-color:#2563eb;
}
.brand-btn img{
    width:24px;
    height:24px;
    padding:3px;
    border:2px solid #d1d5db;
    border-radius:8px;
    object-fit:cover;
}
.model-container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}
.model-card{
    background:#fff;
    border-radius:14px;
    padding:16px;
    border:1px solid #d1d5db;
    text-align:center;
}
.model-name{
    font-size:15px;
    color:#111;
    margin-bottom:12px;
    font-weight:500;
    text-align:center;
}
.down-btn{
    display:block;
    width:100%;
    padding:10px;
    background:#2563eb;
    color:#fff;
    text-align:center;
    border-radius:8px;
    text-decoration:none;
    font-size:15px;
}
</style>
</head>
<body>
<a href="./index.html" class="back-btn">返回首页</a>

<div class="wrap-card">
    <div class="card-title">刷机包专区</div>

    <div class="logo-wrap">
        <div class="brand-logo">
            <img src="https://cy-pic.kuaizhan.com/g3/93/41/66d6-4ac0-4674-b465-21690837a6a552?cysign=7f0733bef93b93218911f22d883eaffc&cyt=1777720413">
        </div>
        <div class="brand-logo">

        </div>
        <div class="brand-logo">

    </div>

    <div class="line"></div>

    <div class="brand-btns">
        <div class="brand-btn active" data-brand="oneplus">

        <div class="brand-btn" data-brand="xiaomi">

        <div class="brand-btn" data-brand="redmi">

    </div>
</div>

<div class="model-container" id="modelBox"></div>

<script>

const brandBtns = document.querySelectorAll('.brand-btn');

];

// 真我：删除GT/GT2/GT2Pro，改名+新增机型+全部链接配齐，格式大写空格

    {name:"真我 GT8 Pro",url:"https://pan.quark.cn/s/3bbca5a1cf45#/list/share"},
    {name:"真我 GT8",url:"https://pan.quark.cn/s/f2a456a55eee#/list/share"},

// 小米机型 仅格式统一，链接预留

// 红米机型 仅格式统一，链接预留
const redmiData = [
    {name:"红米 K90 Pro Max",url:""},
    {name:"红米 K90 Pro",url:""},

    {name:"红米 K40",url:""}

// 渲染机型
function renderList(list){
    modelBox.innerHTML = "";
    list.forEach(item=>{
        modelBox.innerHTML += `
        <div class="model-card">
            <div class="model-name">${item.name}</div>
            <a href="${item.url}" target="_blank" class="down-btn">立即下载</a>
        </div>
        `;
    });
}

// 默认显示一加
renderList(oneplusData);

// 品牌切换
brandBtns.forEach(btn=>{
    btn.addEventListener('click',()=>{
        brandBtns.forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        let brand = btn.dataset.brand;
        switch(brand){
            case 'oneplus': renderList(oneplusData); break;
            case 'realme': renderList(realmeData); break;
            case 'xiaomi': renderList(xiaomiData); break;
            case 'redmi': renderList(redmiData); break;
        }
    });
})
</script>
</body>
</html>
